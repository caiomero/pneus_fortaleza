{% extends "base.html" %}
{% block content %}

<h1 class="page-title">Clientes</h1>

<div class="card">
    <h2>Novo Cliente</h2>

    <form action="/add_cliente" method="POST">
        <div class="form-grid">
            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="text" name="telefone" placeholder="Telefone">
            <input type="text" name="veiculo" placeholder="Veículo">
            <input type="text" name="placa" placeholder="Placa">
        </div>

        <button type="submit" class="btn-primary">
            Salvar Cliente
        </button>
    </form>
</div>

<div class="card">
    <h2>Lista de Clientes</h2>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Veículo</th>
                <th>Placa</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody>
            {% for cliente in clientes %}
            <tr>
                <td>{{ cliente[1] }}</td>
                <td>{{ cliente[2] }}</td>
                <td>{{ cliente[3] }}</td>
                <td>{{ cliente[4] }}</td>
                <td>
                    <a href="/delete/{{ cliente[0] }}"
                       class="btn-delete"
                       onclick="return confirm('Excluir cliente?')">
                       Excluir
                    </a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5" class="empty">
                    Nenhum cliente cadastrado.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
