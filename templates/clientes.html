<!DOCTYPE html>
<html>
<head>
    <title>Clientes - Borracharia</title>
</head>
<body>

<h1>Clientes</h1>

<!-- BUSCA -->
<form method="GET" action="/clientes">
    <input type="text" name="busca" placeholder="Buscar cliente pelo nome">
    <button type="submit">Buscar</button>
</form>

<hr>

<!-- FORMULÁRIO CADASTRO -->
<h2>Cadastrar Cliente</h2>

<form method="POST" action="/add_cliente">
    <input type="text" name="nome" placeholder="Nome" required><br><br>
    <input type="text" name="telefone" placeholder="Telefone"><br><br>
    <input type="text" name="veiculo" placeholder="Veículo"><br><br>
    <input type="text" name="placa" placeholder="Placa"><br><br>
    <textarea name="descricao" placeholder="Descrição"></textarea><br><br>
    <button type="submit">Salvar</button>
</form>

<hr>

<!-- LISTA DE CLIENTES -->
<h2>Lista de Clientes</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Telefone</th>
        <th>Veículo</th>
        <th>Placa</th>
        <th>Descrição</th>
        <th>Ações</th>
    </tr>

    {% for cliente in clientes %}
    <tr>
        <td>{{ cliente[0] }}</td>
        <td>{{ cliente[1] }}</td>
        <td>{{ cliente[2] }}</td>
        <td>{{ cliente[3] }}</td>
        <td>{{ cliente[4] }}</td>
        <td>{{ cliente[5] }}</td>
        <td>
            <a href="/editar/{{ cliente[0] }}">Editar</a> |
            <a href="/delete/{{ cliente[0] }}">Excluir</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
